# HolterFM pretraining config
data:
  data_dir: data/DMS
  episode_len: 64
  pre_samples: 24
  post_samples: 56
  max_beats: 150000
  num_workers: 4

model:
  beat_embed_dim: 256
  episode_d_model: 384
  rhythm_d_model: 128
  day_d_model: 512
  episode_len: 64
  n_codes: 512
  n_rr_bins: 32

training:
  epochs: 40
  batch_size: 1          # 1 full day per GPU, 8 GPUs = global batch 8
  lr: 2.0e-4
  lr_min: 2.0e-5
  warmup_steps: 2000
  weight_decay: 0.05
  grad_clip: 1.0
  betas: [0.9, 0.95]
  use_amp: true
  amp_dtype: bfloat16

  save_every: 2
  log_every: 10

  # loss weights (from experiment plan)
  loss_weights:
    beat: 0.35
    episode: 0.20
    day: 0.20
    rhythm: 0.20
    report: 0.05
    vq: 0.10

  # day/report loss ramp-up over first N epochs
  ramp_epochs: 5

split:
  train_ratio: 0.70
  val_ratio: 0.10
  test_ratio: 0.20
  seed: 42
  stratify_by: pvc_burden_bin  # bins: 0, 0-1%, 1-5%, 5-10%, >10%

output:
  checkpoint_dir: checkpoints/pretrain
  log_dir: logs/pretrain
  keep_best: 3
