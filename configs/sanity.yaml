data:
  data_dir: data/DMS
  processed_dir: results/processed
  max_beats_per_window: 300
  window_sec: 300

model:
  mode: ordered
  in_channels: 3
  beat_samples: 128
  beat_dim: 128
  window_dim: 256
  day_dim: 256
  w_heads: 4
  w_layers: 4
  d_layers: 2
  pred_hidden: 128
  dropout: 0.1
  ema_tau: 0.996
  max_beats: 300
  subsample_beats: 64
  gradient_checkpoint: false

loss:
  masked:
    spectral_weight: 0.1
  order:
    horizons: [1, 3, 6]
    horizon_weights: [0.5, 0.3, 0.2]
  regularization:
    var_weight: 1.0
    cov_weight: 0.04
    var_floor: 1.0
  weights:
    masked: 1.0
    order: 0.5
    var: 0.1
    cov: 0.1
    day: 0.5

training:
  epochs: 20
  batch_size: 8
  lr: 0.0001
  warmup_steps: 50
  max_windows: 288
  seed: 42

output:
  dir: results/sanity
  checkpoint_dir: checkpoints/sanity
